name: Review external challenge links

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check official pages
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/check-external-links.mjs | tee external-link-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: external-link-report
          path: external-link-report.json
